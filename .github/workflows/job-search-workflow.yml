name: Job Search Agent - Daily Run

on:
  schedule:
    # Run at 9 AM UTC daily
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run job search agent
        timeout-minutes: 10
        env:
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
        run: python job_search_agent_scheduled.py
      
      - name: Check results
        if: always()
        run: |
          echo "=== Run Log (Last 20 lines) ==="
          tail -20 run_log_scheduled.txt 2>/dev/null || echo "No log file"
          echo ""
          echo "=== Jobs Found ==="
          if [ -f jobs_scheduled.csv ]; then
            JOBS_COUNT=$(tail -n +2 jobs_scheduled.csv | wc -l)
            echo "Total jobs in CSV: $JOBS_COUNT"
            echo "First 3 jobs:"
            head -4 jobs_scheduled.csv | tail -3
          else
            echo "No jobs CSV found"
          fi
      
      - name: Commit and push
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet --cached || git commit -m "Daily job scrape - $(date +'%Y-%m-%d %H:%M:%S UTC')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main 2>&1 || echo "Git push completed"
      
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-results-${{ github.run_id }}
          path: |
            jobs_scheduled.csv
            run_log_scheduled.txt
            seen_jobs_scheduled.json
          retention-days: 30
      
      - name: Create job summary
        if: always()
        run: |
          echo "## 📊 Job Search Agent Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f jobs_scheduled.csv ]; then
            JOBS_COUNT=$(tail -n +2 jobs_scheduled.csv | wc -l)
            echo "✅ **Jobs Found:** $JOBS_COUNT" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **No new jobs found today**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 **Files Generated:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`jobs_scheduled.csv\` - All job listings" >> $GITHUB_STEP_SUMMARY
          echo "- \`run_log_scheduled.txt\` - Execution log" >> $GITHUB_STEP_SUMMARY
          echo "- \`seen_jobs_scheduled.json\` - Deduplication database" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Access Results:**" >> $GITHUB_STEP_SUMMARY
          echo "1. [View jobs_scheduled.csv in repo](https://github.com/${{ github.repository }}/blob/main/jobs_scheduled.csv)" >> $GITHUB_STEP_SUMMARY
          echo "2. Download from artifacts (see above)" >> $GITHUB_STEP_SUMMARY
